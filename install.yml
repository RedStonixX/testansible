- name: Configuration SNMP, Centreon et MFA SSH
  hosts: serveurs
  become: yes

  vars:
    # --- Variables MFA ---
    target_user: "root"
    local_otp_secret: "/root/ansible/.google_authenticator"

    # --- Variables SNMP ---
    snmp_commu: "projet_communaute"
    centreon_ip: "192.168.1.8"

    # --- Variables Centreon ---
    centreon_admin: "admin"
    centreon_password: "Almacentreon1!"

    # --- Variables Vault ---
    vault_path: "secret/servers/{{ inventory_hostname }}"

  tasks:

    # =========================
    # 🔐 VAULT SAFE READ
    # =========================

    - name: Lire secret Vault (safe)
      delegate_to: localhost
      community.hashi_vault.vault_read:
        url: "{{ lookup('env','VAULT_ADDR') }}"
        token: "{{ lookup('env','VAULT_TOKEN') }}"
        path: "{{ vault_path }}"
      register: vault_result
      failed_when: false

    - name: Extraire secret Vault de façon safe
      set_fact:
        vault_secret: >-
          {{
            (vault_result.data.data.password | default(''))
            if (vault_result is defined and vault_result.data is defined)
            else ''
          }}

    # =========================
    # 🔐 GENERATION PASSWORD
    # =========================

    - name: Générer mdp si absent dans Vault
      when: vault_secret | default('') | trim == ''
      set_fact:
        new_root_password: "{{ lookup('password', '/dev/null length=5 chars=ascii_letters') }}"

    - name: Définir mot de passe final (Vault ou nouveau)
      set_fact:
        final_password: >-
          {{
            vault_secret
            if (vault_secret | default('') | trim != '')
            else new_root_password
          }}

    # =========================
    # 🔐 STOCKAGE VAULT
    # =========================

    - name: Stocker mot de passe dans Vault
      when: new_root_password is defined
      shell: >
        vault kv put {{ vault_path }} password="{{ new_root_password }}"

    # =========================
    # 🔐 HASH PASSWORD
    # =========================

    - name: Hasher le mot de passe root
      set_fact:
        root_password_hashed: "{{ final_password | password_hash('sha512') }}"

    - name: Appliquer le mot de passe root
      user:
        name: root
        password: "{{ root_password_hashed }}"

    # =========================
    # 🔐 MFA SSH
    # =========================

    - name: Installer le module PAM Google Authenticator
      apt:
        name: libpam-google-authenticator
        state: present
        update_cache: yes

    - name: Déployer le secret OTP commun
      copy:
        src: "{{ local_otp_secret }}"
        dest: "/{{ target_user }}/.google_authenticator"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0400'

    - name: Configurer PAM pour SSH (OTP)
      lineinfile:
        path: /etc/pam.d/sshd
        regexp: '^auth required pam_google_authenticator.so'
        line: "auth required pam_google_authenticator.so"
        state: present

    - name: Activer KbdInteractiveAuthentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?KbdInteractiveAuthentication'
        line: 'KbdInteractiveAuthentication yes'

    - name: Activer ChallengeResponseAuthentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?ChallengeResponseAuthentication'
        line: 'ChallengeResponseAuthentication yes'

    - name: Activer PasswordAuthentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication yes'

    - name: Configurer SSH - MFA uniquement pour login interactif
      blockinfile:
        path: /etc/ssh/sshd_config
        block: |
          UsePAM yes
          AuthenticationMethods publickey keyboard-interactive
          PermitRootLogin yes
      notify: restart ssh

    # =========================
    # 🖧 SNMP + CENTREON
    # =========================

    - name: Installation SNMP
      apt:
        name: [snmp, snmpd]
        state: present

    - name: Supprimer ancienne config agentaddress
      lineinfile:
        path: /etc/snmp/snmpd.conf
        regexp: '^agentaddress'
        state: absent

    - name: Config SNMP
      blockinfile:
        path: /etc/snmp/snmpd.conf
        block: |
          agentaddress udp:161
          view centreon included .1.3.6.1
          rocommunity {{ snmp_commu }} {{ centreon_ip }}
      notify: restart snmpd

    - name: Vérifier host Centreon
      delegate_to: localhost
      shell: >
        ssh -i ~/ansible/privcentreon root@{{ centreon_ip }} "
        centreon -u {{ centreon_admin }} -p {{ centreon_password }} -o HOST -a show -v '{{ inventory_hostname }}'"
      register: centreon_host_check
      changed_when: false
      failed_when: false

    - name: Ajouter host Centreon si absent
      delegate_to: localhost
      shell: >
        ssh -i ~/ansible/privcentreon root@{{ centreon_ip }} "
        centreon -u {{ centreon_admin }} -p {{ centreon_password }} -o HOST -a ADD
        -v '{{ inventory_hostname }};{{ inventory_hostname }};{{ ansible_host }};OS-Linux-SNMP-custom;central;'"
      when: centreon_host_check.stdout == ""

    - name: Appliquer paramètres SNMP Centreon
      delegate_to: localhost
      shell: >
        ssh -i ~/ansible/privcentreon root@{{ centreon_ip }} "
        centreon -u {{ centreon_admin }} -p {{ centreon_password }} -o HOST -a setparam
        -v '{{ inventory_hostname }};{{ item.param }};{{ item.value }}'"
      loop:
        - { param: 'snmp_community', value: "{{ snmp_commu }}" }
        - { param: 'snmp_version', value: '2c' }

    - name: Générer services Centreon
      delegate_to: localhost
      shell: >
        ssh -i ~/ansible/privcentreon root@{{ centreon_ip }} "
        centreon -u {{ centreon_admin }} -p {{ centreon_password }} -o HOST -a applytpl
        -v '{{ inventory_hostname }}'"

    - name: Appliquer config Centreon
      delegate_to: localhost
      shell: >
        ssh -i ~/ansible/privcentreon root@{{ centreon_ip }} "
        centreon -u {{ centreon_admin }} -p {{ centreon_password }} -a APPLYCFG
        -v 'Central'"

  handlers:

    - name: restart snmpd
      service:
        name: snmpd
        state: restarted

    - name: restart ssh
      service:
        name: ssh
        state: restarted
