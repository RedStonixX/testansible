- name: Configuration SNMP, Centreon et MFA SSH
  hosts: serveurs
  become: yes

  vars:
    # --- Variables MFA ---
    target_user: "root"
    local_otp_secret: "/root/ansible/.google_authenticator"

    # --- Variables SNMP ---
    snmp_commu: "projet_communaute"
    centreon_ip: "192.168.1.8"
    
    # --- Variables Centreon ---
    centreon_admin: "admin"
    centreon_password: "Almacentreon1!" 

    # --- Variables Vault ---
    vault_path: "secret/data/servers/{{ inventory_hostname }}"

  tasks:

    # =========================
    # 🔐 PARTIE VAULT (AJOUTÉE)
    # =========================

    - name: Vérifier si un mot de passe existe dans Vault
      delegate_to: localhost
      set_fact:
        vault_secret: "{{ lookup('community.hashi_vault.hashi_vault', 'secret=' + vault_path + ' field=password', errors='ignore') }}"
      failed_when: false

    - name: Générer un mot de passe si absent
      when: vault_secret is not defined or vault_secret == ""
      delegate_to: localhost
      set_fact:
        new_root_password: "{{ lookup('password', '/dev/null length=20 chars=ascii_letters') }}"

    - name: Stocker le mot de passe dans Vault
      when: new_root_password is defined
      delegate_to: localhost
      shell: >
        vault kv put secret/servers/{{ inventory_hostname }} password="{{ new_root_password }}"

    - name: Hasher le mot de passe
      when: new_root_password is defined
      set_fact:
        root_password_hashed: "{{ new_root_password | password_hash('sha512') }}"

    - name: Appliquer le mot de passe root sur la machine
      when: new_root_password is defined
      user:
        name: root
        password: "{{ root_password_hashed }}"

    # =========================
    # 🔐 MFA SSH
    # =========================

    - name: Installer le module PAM Google Authenticator
      apt:
        name: libpam-google-authenticator
        state: present
        update_cache: yes

    - name: Déployer le secret OTP commun
      copy:
        src: "{{ local_otp_secret }}"
        dest: "/{{ target_user }}/.google_authenticator"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0400'

    - name: Configurer PAM pour SSH (OTP)
      lineinfile:
        path: /etc/pam.d/sshd
        regexp: '^auth required pam_google_authenticator.so'
        line: "auth required pam_google_authenticator.so"
        state: present

    - name: Activer KbdInteractiveAuthentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?KbdInteractiveAuthentication'
        line: 'KbdInteractiveAuthentication yes'

    - name: Activer ChallengeResponseAuthentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?ChallengeResponseAuthentication'
        line: 'ChallengeResponseAuthentication yes'

    - name: Activer PasswordAuthentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication yes'

    - name: Configurer SSH - MFA uniquement pour mot de passe
      blockinfile:
        path: /etc/ssh/sshd_config
        block: |
          UsePAM yes
          AuthenticationMethods publickey keyboard-interactive
          PermitRootLogin yes
      notify: restart ssh

    # =========================
    # SNMP + Centreon (inchangé)
    # =========================

    - name: Installation de SNMP
      apt:
        name: [snmp, snmpd]
        state: present

    - name: Appliquer la nouvelle configuration SNMP
      lineinfile:
        path: /etc/snmp/snmpd.conf
        regexp: '^agentaddress'
        state: absent

    - name: Configuration du fichier snmpd.conf
      blockinfile:
        path: /etc/snmp/snmpd.conf
        block: |
          agentaddress udp:161
          view centreon included .1.3.6.1
          rocommunity {{ snmp_commu }} {{ centreon_ip }}
      notify: restart snmpd

    - name: Vérifier si l'hôte existe dans Centreon
      delegate_to: localhost
      shell: >
        ssh -i ~/ansible/privcentreon root@{{ centreon_ip }} "
        centreon -u {{ centreon_admin }} -p {{ centreon_password }} -o HOST -a show -v '{{ inventory_hostname }}'"
      register: centreon_host_check
      changed_when: false
      failed_when: false

    - name: Ajouter la machine dans Centreon si elle n'existe pas
      delegate_to: localhost
      shell: >
        ssh -i ~/ansible/privcentreon root@{{ centreon_ip }} "
        centreon -u {{ centreon_admin }} -p {{ centreon_password }} -o HOST -a ADD 
        -v '{{ inventory_hostname }};{{ inventory_hostname }};{{ ansible_host }};OS-Linux-SNMP-custom;central;'"
      when: centreon_host_check.stdout == ""

    - name: Appliquer les paramètres SNMP dans Centreon
      delegate_to: localhost
      shell: >
        ssh -i ~/ansible/privcentreon root@{{ centreon_ip }} "centreon -u {{ centreon_admin }} -p {{ centreon_password }} -o HOST -a setparam 
        -v '{{ inventory_hostname }};{{ item.param }};{{ item.value }}'"
      loop:
        - { param: 'snmp_community', value: "{{ snmp_commu }}" }
        - { param: 'snmp_version', value: '2c' }

    - name: Générer les services
      delegate_to: localhost
      shell: >
        ssh -i ~/ansible/privcentreon root@{{ centreon_ip }} "centreon -u {{ centreon_admin }} -p {{ centreon_password }} -o HOST -a applytpl 
        -v '{{ inventory_hostname }}'"

    - name: Appliquer la configuration Centreon
      delegate_to: localhost
      shell: >
        ssh -i ~/ansible/privcentreon root@{{ centreon_ip }} "centreon -u {{ centreon_admin }} -p {{ centreon_password }} -a APPLYCFG 
        -v 'Central'"

  handlers:
    - name: restart snmpd
      service:
        name: snmpd
        state: restarted

    - name: restart ssh
      service:
        name: ssh
        state: restarted
